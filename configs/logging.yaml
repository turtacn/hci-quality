version: 1
disable_existing_loggers: false

formatters:
  default:
    format: "%(asctime)s %(levelname)s %(name)s :: %(message)s"
    datefmt: "%Y-%m-%dT%H:%M:%S"
  json:
    format: '{"ts":"%(asctime)s","lvl":"%(levelname)s","logger":"%(name)s","msg":"%(message)s"}'
    datefmt: "%Y-%m-%dT%H:%M:%S"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: default
    stream: ext://sys.stderr
  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: json
    filename: logs/hci_quality.log
    maxBytes: 10485760
    backupCount: 5
    encoding: utf-8

loggers:
  hci_quality:
    level: DEBUG
    handlers: [console, file]
    propagate: false
  uvicorn:
    level: INFO
    handlers: [console, file]
    propagate: false
  kuzu:
    level: WARNING
    handlers: [console]
    propagate: false

root:
  level: WARNING
  handlers: [console]
